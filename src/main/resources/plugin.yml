name: DisablePhantoms
version: '${project.version}'
main: com.ezinnovations.disablephantoms.DisablePhantoms
api-version: '1.20'
folia-supported: true
description: Prevent phantom spawning per-world. Works on Bukkit/Spigot/Paper/Purpur/Folia.
author: EzInnovations
commands:
  homes:
    description: Opens the homes GUI preview
    usage: /homes
  disablephantoms:
    description: Manage phantom disabling per world
    usage: /disablephantoms <reload|status|add|remove|list>
    permission: disablephantoms.admin
permissions:
  disablephantoms.admin:
    description: Access to all DisablePhantoms commands
    default: op
